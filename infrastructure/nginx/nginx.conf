worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Rate limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/s;

    upstream frontend    { server fitforge-frontend:80; }
    upstream auth        { server fitforge-auth:8081; }
    upstream api         { server fitforge-api:3001; }
    upstream diet        { server fitforge-diet:8082; }
    upstream ai          { server fitforge-ai:8000; }

    server {
        listen 80;
        server_name _;

        # ── WebSocket (Socket.io) ──────────────────────────────────────────
        location /ws {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── Auth Service ───────────────────────────────────────────────────
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass         http://auth;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Host        $host;
        }

        # ── Main API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://api/;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Host        $host;
            client_max_body_size 20M;
        }

        # ── Diet Service ───────────────────────────────────────────────────
        location /diet/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://diet/;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   Host        $host;
            client_max_body_size 5M;
        }

        # ── AI Service ─────────────────────────────────────────────────────
        location /ai/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://ai/ai/;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   Host        $host;
            client_max_body_size 15M;
            proxy_read_timeout 60s;
        }

        # ── Frontend (SPA) ─────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Health check ───────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
