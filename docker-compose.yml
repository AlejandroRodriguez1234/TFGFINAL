version: '3.9'

networks:
  fitforge-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:

services:
  # ─── DATABASES ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fitforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitforge}
      POSTGRES_USER: ${POSTGRES_USER:-fitforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitforge_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - fitforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitforge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fitforge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AUTH SERVICE (Java Spring Boot) ────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: fitforge-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fitforge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fitforge}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-fitforge_secret}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      TOTP_ISSUER: ${TOTP_ISSUER:-FitForge}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitforge-network

  # ─── MAIN API SERVICE (Node.js NestJS) ──────────────────────────────────────
  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: fitforge-api
    restart: unless-stopped
    command: sh -c "npx prisma db push --accept-data-loss && node dist/main"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitforge}:${POSTGRES_PASSWORD:-fitforge_secret}@postgres:5432/${POSTGRES_DB:-fitforge}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      AUTH_SERVICE_URL: http://auth-service:8081
      DIET_SERVICE_URL: http://diet-service:8082
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${API_SERVICE_PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitforge-network

  # ─── DIET SERVICE (Laravel) ─────────────────────────────────────────────────
  diet-service:
    build:
      context: ./services/diet-service
      dockerfile: Dockerfile
    container_name: fitforge-diet
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${DIET_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-fitforge}
      DB_USERNAME: ${POSTGRES_USER:-fitforge}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fitforge_secret}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "${DIET_SERVICE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitforge-network

  # ─── AI SERVICE (Python FastAPI) ────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: fitforge-ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitforge}:${POSTGRES_PASSWORD:-fitforge_secret}@postgres:5432/${POSTGRES_DB:-fitforge}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitforge-network

  # ─── FRONTEND (React) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitforge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - fitforge-network

  # ─── NGINX REVERSE PROXY ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fitforge-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - api-service
      - diet-service
      - ai-service
    networks:
      - fitforge-network
